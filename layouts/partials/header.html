<header class="site-header">
  <div class="site-masthead">
    <nav class="navbar container">
      <div class="nav-logo">
        <a class="navbar-brand" href="/">French Family</a>
      </div>
      <!-- Mobile navigation toggle button -->
      <button id="nav-toggler" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"
        aria-controls="mobile-nav-panel">
        <!-- Example SVG for a hamburger icon -->
        <svg class="hamburger-icon" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd"
            d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
            clip-rule="evenodd"></path>
        </svg>
      </button>
      {{ partial "nav.html" . }}
      <!-- Theme switcher button -->
      <div class="nav-right">
        <button id="theme-switcher-btn" class="theme-switcher" aria-label="Toggle dark mode">
          <!-- Example SVG for a sun/moon icon -->
          <svg class="hamburger-icon" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
          </svg>
        </button>
      </div>
    </nav>
  </div>
  <!-- Mobile navigation panel (initially hidden) -->
  <div id="mobile-nav-panel" class="mobile-nav hidden">
    <!-- Content from nav.html or a simplified mobile menu structure -->
    <ul class="mobile-nav-list">
      {{ range .Site.Menus.main }}
      <li><a class="mobile-nav-link" href="{{ .URL }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
</header>

<script>
  const navToggler = document.getElementById('nav-toggler');
  const mobileNav = document.getElementById('mobile-nav-panel');
  navToggler?.addEventListener('click', () => {
    mobileNav?.classList.toggle('hidden');
  });
  const themeSwitcherBtn = document.getElementById('theme-switcher-btn');
  const applyTheme = (theme) => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
  };
  const toggleTheme = () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  };
  const initialTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(initialTheme);
  document.addEventListener('DOMContentLoaded', () => {
    themeSwitcherBtn?.addEventListener('click', toggleTheme);
  });
</script>
