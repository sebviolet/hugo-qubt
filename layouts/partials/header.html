<header class="site-header">
  <div class="site-masthead">
    <nav class="navbar container">
      <!-- Logo -->
      <div class="nav-logo">
        <a class="navbar-brand" href="/">French Family.</a>
      </div>

      <!-- Hamburger Toggler -->
      <button id="nav-toggler" class="nav-toggle" aria-label="Open Mobile Menu">
        <svg viewBox="0 0 20 20" class="hamburger-icon" fill="currentColor">
          <path d="M0 3h20v2H0V3z m0 6h20v2H0V9z m0 6h20v2H0V0z"></path>
        </svg>
      </button>

      {{ partial "nav.html" . }}

    </nav>
  </div>
</header>

<!-- Mobile Nav -->
<div id="mobile-nav-panel" class="mobile-nav hidden">
  <ul class="mobile-nav-list">
    <li><a class="mobile-nav-link" href="/">Home</a></li>
    <li><a class="mobile-nav-link" href="/posts/">Blog</a></li>
  </ul>
</div>

<style>
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    /* <--- this aligns logo + nav to bottom */
    padding: 1rem 0;
  }

  .nav-logo {
    font-size: 1.75rem;
    font-weight: bold;
    margin: 0;
    padding: 0;
    line-height: 1;
  }

  .navbar-brand {
    text-decoration: none;
    color: white;
  }

  .nav-menu {
    display: flex;
    align-items: flex-end;
    /* ensure nav links align with logo */
    gap: 1rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav-logo .navbar-brand {
    font-size: 1.6rem;
    font-weight: bold;
    background: linear-gradient(to right, #7aa2f7, #ad8ee6);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }

  .nav-menu {
    display: none;
    flex-direction: row;
    list-style: none;
    gap: 2rem;
    padding-left: 0;
  }

  .nav-item {
    display: inline-block;
  }

  .nav-link {
    text-decoration: none;
    color: #c0caf5;
    padding: 0.5rem 1rem;
  }

  .nav-link:hover {
    color: #7aa2f7;
  }

  .nav-toggle {
    display: inline-block;
    background: none;
    border: none;
    cursor: pointer;
  }

  .hamburger-icon {
    width: 24px;
    height: 24px;
    color: #c0caf5;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .theme-switcher {
    background: none;
    border: none;
    cursor: pointer;
  }

  /* Mobile nav panel */
  .mobile-nav {
    background-color: #1a1b26;
    padding: 1rem;
  }

  .mobile-nav-list {
    list-style: none;
    padding-left: 0;
  }

  .mobile-nav-link {
    display: block;
    padding: 0.5rem 0;
    color: #c0caf5;
    text-decoration: none;
    border-bottom: 1px solid #292d3e;
  }

  .mobile-nav-link:hover {
    color: #7aa2f7;
  }

  .hidden {
    display: none !important;
  }

  /* Mobile only */
  @media (max-width: 768px) {
    .nav-logo {
      padding-left: 1rem;
    }

    .nav-toggle {
      padding-right: 1rem;
    }
  }

  /* Show desktop nav at large screens */
  @media screen and (min-width: 1024px) {
    .nav-menu {
      display: flex;
    }

    .nav-toggle {
      display: none;
    }

    .mobile-nav {
      display: none !important;
    }
  }
</style>

<script>
  const navToggler = document.getElementById('nav-toggler');
  const mobileNav = document.getElementById('mobile-nav-panel');
  navToggler?.addEventListener('click', () => {
    mobileNav?.classList.toggle('hidden');
  });

  const themeSwitcherBtn = document.getElementById('theme-switcher-btn');
  const applyTheme = (theme) => {
    document.documentElement.classList.toggle('dark', theme === 'dark');
  };
  const toggleTheme = () => {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  };
  const initialTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(initialTheme);
  document.addEventListener('DOMContentLoaded', () => {
    themeSwitcherBtn?.addEventListener('click', toggleTheme);
  });
</script>
